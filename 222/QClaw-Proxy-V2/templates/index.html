<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QClaw Proxy V2 - 极客管理面板</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 100%);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 14px;
            color: var(--text-dim);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .token-id {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-label {
            color: var(--text-dim);
        }

        .stat-value {
            font-weight: 600;
        }

        .card-actions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: flex-end;
        }

        .btn-delete {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.7;
        }

        .btn-delete:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #10b981;
            height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry { margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>QClaw Proxy V2</h1>
                <p>多账户智能轮询 & 极客管理面板</p>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="harvest()">同步当前账号</button>
                <button class="btn btn-outline" onclick="loadAccounts()">刷新列表</button>
            </div>
        </header>

        <div id="stats" class="stats-grid">
            <!-- Cards will be injected here -->
        </div>

        <div id="empty" class="empty-state" style="display: none;">
            还没收割任何账号，请点击右上方按钮开始。
        </div>

        <h3 style="margin-bottom: 15px; font-size: 18px;">运行状态</h3>
        <div class="log-panel" id="logs">
            <div class="log-entry">[*] 系统就绪。API 端口: 18733</div>
            <div class="log-entry">[*] 提示: 请在客户端设置 API Base 为 http://localhost:18733</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function log(msg) {
            const l = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            l.appendChild(entry);
            l.scrollTop = l.scrollHeight;
        }

        async function harvest() {
            log("正在尝试收割当前 QClaw 账号...");
            try {
                const res = await fetch('/api/harvest', { method: 'POST' });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error);
                    log("收割失败: " + data.error);
                } else {
                    showToast(data.added ? "收割成功！" : "账号已存在");
                    log(data.added ? "✅ 新账号已加入池子" : "ℹ️ 账号已在池中，无需重复同步");
                    loadAccounts();
                }
            } catch (e) {
                showToast("连接失败");
            }
        }

        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                const grid = document.getElementById('stats');
                const empty = document.getElementById('empty');
                
                grid.innerHTML = '';
                if (data.length === 0) {
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    data.forEach(acc => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-header">
                                <div class="token-id">${acc.id}</div>
                                <div class="status-badge">Active</div>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">成功请求</span>
                                <span class="stat-value" style="color: var(--success)">${acc.success}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">失败/重试</span>
                                <span class="stat-value" style="color: var(--danger)">${acc.fail}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">最后使用</span>
                                <span class="stat-value">${acc.last_used}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-delete" onclick="deleteAcc('${acc.token}')">删除此凭证</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (e) {
                log("无法加载账户列表");
            }
        }

        async function deleteAcc(token) {
            if (!confirm("确定要删除这个凭证吗？")) return;
            await fetch(`/api/accounts?token=${encodeURIComponent(token)}`, { method: 'DELETE' });
            loadAccounts();
            log("已移除一个账号凭证");
        }

        // Initial Load
        loadAccounts();
        setInterval(loadAccounts, 5000); // Auto refresh
    </script>
</body>
</html>
